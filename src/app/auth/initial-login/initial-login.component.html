<div class="form-container">
  <h3>Change Password</h3>
  <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()" (keydown.enter)="onSubmit()">

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" formControlName="email">
      <div class="error">
        <small *ngIf="changePasswordForm.get('email')?.errors?.['required']">Name is required.</small>
        <small *ngIf="changePasswordForm.get('email')?.errors?.['pattern']">Invalid email</small>
      </div>
    </div>


    <div class="form-group">
      <label for="oldPassword">Old Password</label>
      <input type="password" formControlName="oldPassword">
    </div>

    <div class="form-group">
      <label for="newPassword">New Password</label>
      <input type="password" formControlName="newPassword">
      <div class="error">
        <small *ngIf="changePasswordForm.get('newPassword')?.errors?.['required']">Password is required.</small>
        <small *ngIf="changePasswordForm.get('newPassword')?.errors?.['pattern']">Password must have at least one number and one symbol.</small>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" formControlName="confirmPassword">
    </div>

    <button type="submit">Change</button>
  </form>
</div>
