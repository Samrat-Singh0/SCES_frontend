<header>Semester</header>

<div class="mt-2 download-btn">
  <button class="btn-download" (click)="downloadReport('PDF')">
    <i class="bi bi-download"></i>Download PDF
  </button>

  <button class="btn-download" (click)="downloadReport('XLSX')">
    <i class="bi bi-download"></i>Download XLSX
  </button>
</div>

<div class="add-container">
  <button  class="add-btn" (click)="addSemester()">
    <mat-icon>add</mat-icon>
    ADD SEMESTER
  </button>
</div>

<table class="container">
  <tr>
    <th>S.N.</th>
    <th>Label</th>
    <th>Fee (Rs.)</th>
    <th>Start Date</th>
    <th>End Date</th>
    <th>Edit</th>
  </tr>
  <tr *ngFor="let semester of semesters; let i = index;">
    <td>{{ i + 1 }}</td>
    <td>{{semester.label}}</td>
    <td>{{semester.fee}}</td>
    <td>{{semester.startDate}}</td>
    <td>{{semester.endDate}}</td>
    <td class="edit-delete-btn">
      <button mat-mini-fab matTooltip="Update" aria-label="Edit User" class="btn-edit" (click)="updateSemester(semester)">
        <mat-icon>edit</mat-icon>
      </button>

    </td>
  </tr>
</table>

<div class="no-data-message" *ngIf="semesters.length === 0">
  <p>No data found.</p>
</div>
