<header> Users </header>

<div class="control-container">

    <form  class="search-container" [formGroup]="searchForm" (ngSubmit)="searchUser()" >

        <i class="bi bi-search name-search-icon"></i>
        <input type="text" class="search-input" placeholder="Full Name" formControlName="fullName">
        <div class = "error" *ngIf="this.searchForm.get('fullName')?.invalid && this.searchForm.get('fullName')?.touched">
          <small *ngIf="this.searchForm.get('fullName')?.errors?.['pattern']"></small>
        </div>

        <i class="bi bi-search role-search-icon"></i>
        <input type="text" class="search-input" placeholder="Role" formControlName="role">
        <div class = "error" *ngIf="this.searchForm.get('role')?.invalid && this.searchForm.get('role')?.touched">
          <small *ngIf="this.searchForm.get('role')?.errors?.['pattern']"></small>
        </div>


        <i class="bi bi-search contact-search-icon"></i>
        <input type="text" class="search-input" placeholder="Phone Number" formControlName="phoneNumber">
        <div class = "error" *ngIf="this.searchForm.get('phoneNumber')?.invalid && this.searchForm.get('phoneNumber')?.touched">
          <small *ngIf="this.searchForm.get('phoneNumber')?.errors?.['pattern']"></small>
        </div>
      <button class="search-btn" type="submit">Search</button>
      <button class="reset-btn" (click)="resetSearchForm()">Reset</button>

    </form>


  <div class="add-container">
    <button class="add-btn" (click)="openDialog()">
      <mat-icon>add</mat-icon>
      ADD USER
    </button>
  </div>
</div>

<table mat-table [dataSource]="users" class="mat-elevation-z24 container">

  <ng-container matColumnDef="index">
    <th mat-header-cell *matHeaderCellDef>S.N.</th>
    <td mat-cell *matCellDef="let i = index"> {{ i + 1 }}</td>
  </ng-container>

  <ng-container matColumnDef="fullName">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef = "let user">{{user.fullName}}</td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef = "let user">{{user.email}}</td>
  </ng-container>

  <ng-container matColumnDef="address">
    <th mat-header-cell *matHeaderCellDef>Address</th>
    <td mat-cell *matCellDef = "let user">{{user.address}}</td>
  </ng-container>

  <ng-container matColumnDef="phoneNumber">
    <th mat-header-cell *matHeaderCellDef>Contact No.</th>
    <td mat-cell *matCellDef = "let user">{{user.phoneNumber}}</td>
  </ng-container>

  <ng-container matColumnDef="role">
    <th mat-header-cell *matHeaderCellDef>Role</th>
    <td mat-cell *matCellDef = "let user" [ngSwitch]="user.role">
      <label *ngSwitchCase="'ADMIN'">Instructor</label>
      <label *ngSwitchCase="'USER'">Student</label>
      <label *ngSwitchCase="'SUPER_ADMIN'">SUPER_ADMIN</label>
      <label *ngSwitchDefault>#NAN</label>
    </td>
  </ng-container>

  <ng-container matColumnDef="edit">
    <th mat-header-cell *matHeaderCellDef>Edit</th>
    <td mat-cell *matCellDef="let user" class="edit-delete-btn">
      <button mat-mini-fab aria-label="Edit User" class="btn-edit" (click)="openDialog(user)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-mini-fab aria-label="Delete User" class="btn-delete" (click)="deleteUser(user.userCode, user.fullName)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef ="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
