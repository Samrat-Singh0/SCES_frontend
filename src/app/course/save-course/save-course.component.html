<div class="header-section">
  <div *ngIf="isDialog()" class="close-icon">
    <button class="close-btn" (click) = "closeForm()"><mat-icon>close</mat-icon></button>
  </div>
  <div *ngIf="!isDialog()" class="go-back-icon">
    <button class="go-back-btn" (click) = "goBack()"><mat-icon>arrow_back</mat-icon></button>
  </div>
  <div class="header-div">
    <h4 class="header-title">{{ isEditable?"Update Course":"Add Course" }}</h4>
  </div>
</div>
  <form [formGroup]="courseForm" class="course-form">
  <div class="form-group">
    <label for="name">Course Name</label>
    <input type="text" id="name" formControlName="name" placeholder="Enter course name">
    <div class="error"
         *ngIf="this.courseForm.get('name')?.touched && this.courseForm.get('name')?.invalid">
      <small *ngIf="this.courseForm.get('name')?.errors?.['pattern']">Please enter alphabets only.</small>
    </div>
  </div>

  <div class="form-group">
    <label for="creditHours">Credit Hours</label>
    <input type="number" id="creditHours" formControlName="creditHours" placeholder="e.g. 3">
    <div class="error"
         *ngIf="this.courseForm.get('creditHours')?.touched && this.courseForm.get('creditHours')?.invalid">
      <small *ngIf="this.courseForm.get('creditHours')?.errors?.['required']">Field Required.</small>
    </div>
  </div>

  <div class="form-group">
    <label for="fullMarks">Full Marks</label>
    <input type="number" id="fullMarks" [max]="60" [min]="40" formControlName="fullMarks" placeholder="e.g. 100">
    <div class="error"
         *ngIf="this.courseForm.get('fullMarks')?.touched && this.courseForm.get('fullMarks')?.invalid">
      <small *ngIf="this.courseForm.get('fullMarks')?.errors?.['required']">Field Required.</small>
    </div>
  </div>

  <div class="btn-div">
    <button [ngClass]="this.courseForm.valid ? 'submit-btn-active' : 'submit-btn-inactive'" type="submit" (click)="onSubmit()">{{ isEditable? "Update Course" : "Add" }}</button>
    <button class="reset-btn" type="button" (click)="resetForm()">Reset</button>
  </div>
</form>
