<h2 mat-dialog-title>{{ data.title || 'Confirm Action' }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>

  <!-- renders only when the flag is true -->
  <div *ngIf="data.requireRemarks" class="mt-3">
    <mat-form-field>
      <mat-label>Remarks</mat-label>
      <textarea matInput [(ngModel)]="remarks" rows="3"></textarea>
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-button color="primary" (click)="onConfirm()">Confirm</button>
</mat-dialog-actions>
