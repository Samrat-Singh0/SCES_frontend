<h2 mat-dialog-title>Pay Fee</h2>
<mat-dialog-content>
  <p>Outstanding: Rs. {{data.enrollment.outstandingFee}}</p>
  <mat-form-field appearance="fill" class="w-full">
    <mat-label>Enter Amount</mat-label>
    <input matInput type="number" [(ngModel)]="amount" min="0" [max]="data.enrollment.outstandingFee">
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" (click)="confirmPayment()">Pay</button>
</mat-dialog-actions>
