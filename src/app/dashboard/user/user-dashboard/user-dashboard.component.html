<div class="dashboard-wrapper">
  <nav class="sidebar">
    <h4>Dashboard</h4>
    <ul class="nav flex-column nav-gap">
      <li class="nav-item mb-2">
        <a class="nav-link text-dark d-flex align-items-center px-3" routerLink="enroll/view"
           routerLinkActive="active-tab" >
          <i class="bi bi-box-arrow-in-down" style="margin-left: -4px"></i>
          <span class="flex-grow-1">Enroll</span>
        </a>
      </li>
      <li class="nav-item mb-2">
        <a class="nav-link text-dark d-flex align-items-center px-3" routerLink="grade/view"
           routerLinkActive="active-tab" >
          <i class="bi bi-star-fill sidebar-icon" style="margin-left: -4px"></i>
          <span class="flex-grow-1">Grade</span>
        </a>
      </li>
      <li class="nav-item mb-2">
        <a class="nav-link text-dark d-flex align-items-center px-3" routerLink="attendance/view"
           routerLinkActive="active-tab" >
          <i class="bi bi-clock-fill sidebar-icon" style="margin-left: -4px"></i>
          <span class="flex-grow-1">Attendance</span>
        </a>
      </li>
    </ul>

    <div class="profile-section d-flex align-items-center gap-2 px-3 py-2 border-top border-secondary">
      <i class="bi bi-person-circle sidebar-icon" style="font-size: 1.8rem;"></i>
      <div class="ms-2">
        <div class="fw-semibold">
          {{ joinName.getFullName(currentUser?.firstName, currentUser?.middleName, currentUser?.lastName) }}
        </div>
        <div class="text-muted" style="font-size: 0.85rem;">
          {{ getRole(currentUser?.role)}}
        </div>
      </div>
    </div>

    <button class="btn btn-outline-danger mt-auto logout-btn" (click)="logout()">
      <i class="bi bi-box-arrow-right sidebar-icon" style="margin-left: -10px"></i> Logout
    </button>
  </nav>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
